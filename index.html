<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MorningStars</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0a0a0a;
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: center;
  gap: 30px;
  background: black;
  padding: 15px;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  cursor: pointer;
}

/* SECTIONS */
section {
  display: none;
  padding: 60px 20px;
  text-align: center;
}

.active {
  display: block;
}

/* HERO */
.hero {
  height: 80vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.hero h1 {
  font-size: 50px;
  margin-bottom: 10px;
}

.hero p {
  opacity: 0.7;
}

/* BUTTON */
button {
  padding: 12px 25px;
  background: gold;
  border: none;
  cursor: pointer;
  margin-top: 20px;
  font-weight: bold;
}

/* STORE */
.products {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.product {
  background: #111;
  padding: 20px;
  margin: 15px;
  border-radius: 10px;
  width: 200px;
}

/* SOCIAL */
.social a {
  display: block;
  margin: 10px;
  color: gold;
  text-decoration: none;
  font-size: 18px;
}
</style>
</head>

<body>

<nav>
  <a onclick="showPage('home')">Home</a>
  <a onclick="showPage('store')">Store</a>
  <a onclick="showPage('social')">Social</a>
</nav>

<!-- HOME -->
<section id="home" class="active hero">
  <h1>MorningStars</h1>
  <p>Rise. Shine. Lead.</p>
  <button onclick="showPage('store')">Shop Now</button>
</section>

<!-- STORE -->
<section id="store">
  <h1>Our Collection</h1>

  <div class="products">

    <div class="product">
      <h3>T-Shirt</h3>
      <p>₹999</p>
      <button>Buy</button>
    </div>

    <div class="product">
      <h3>Hoodie</h3>
      <p>₹1999</p>
      <button>Buy</button>
    </div>

  </div>
</section>

<!-- SOCIAL -->
<section id="social">
  <h1>Connect With Us</h1>

  <div class="social">
    <a href="#">Instagram</a>
    <a href="#">YouTube</a>
    <a href="#">Twitter</a>
  </div>
</section>

<script>
function showPage(page) {
  document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}
</script>

</body>
</html>
