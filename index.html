<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MorningStars</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  text-align: center;
}
nav {
  background: #111;
  padding: 15px;
}
nav a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
}
section {
  display: none;
  padding: 50px;
}
.active {
  display: block;
}
button {
  padding: 10px 20px;
  background: gold;
  border: none;
  cursor: pointer;
  font-weight: bold;
}
.product {
  margin: 20px;
}
</style>
</head>

<body>

<nav>
  <a href="#" onclick="showPage('home')">Home</a>
  <a href="#" onclick="showPage('store')">Store</a>
  <a href="#" onclick="showPage('social')">Social</a>
</nav>

<!-- HOME -->
<section id="home" class="active">
  <h1>MorningStars</h1>
  <p>Welcome to the official MorningStars website</p>
  <button onclick="showPage('store')">Shop Now</button>
</section>

<!-- STORE -->
<section id="store">
  <h1>Store</h1>

  <div class="product">
    <h3>T-Shirt</h3>
    <p>₹999</p>
    <button>Buy Now</button>
  </div>

  <div class="product">
    <h3>Hoodie</h3>
    <p>₹1999</p>
    <button>Buy Now</button>
  </div>

</section>

<!-- SOCIAL -->
<section id="social">
  <h1>Follow Us</h1>
  <p><a href="#">Instagram</a></p>
  <p><a href="#">YouTube</a></p>
  <p><a href="#">Twitter</a></p>
</section>

<script>
function showPage(page) {
  document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}
</script>

</body>
</html>
